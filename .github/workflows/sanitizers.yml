name: Sanitizers

# Runs the phase-5 network-redesign full-chain integration runner
# (tst_workerintegration) under AddressSanitizer + LeakSanitizer on Linux to
# enforce I-LEAK-BOUND leak-boundedness
# (docs/design/network-redesign-phase5-verification.md §6). On Linux,
# -fsanitize=address turns on LeakSanitizer, which runs a leak check at each
# process exit. Every scenario is its own process (acq_add_scenario_test), so
# the accepted detached-QCoro-frame leaks of the shutdown scenarios are matched
# by tests/lsan.supp while every other scenario must exit leak-clean. A leak
# outside that suppression closure fails the job — that is the enforcement.
#
# Test/CI-only: this never builds or runs the `acquisition` app target (it links
# crashpad, whose signal handlers can conflict with the sanitizer's). Release
# packaging never sets ACQ_SANITIZE.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  asan-lsan:
    name: ASan + LSan (integration runner)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          modules: 'qtnetworkauth'
          cache: true
          cache-key-prefix: 'qt-6.11.1-linux-sanitizers'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openssl \
            libcurl4-openssl-dev \
            libgl-dev \
            libssl-dev \
            libvulkan-dev \
            libxcb-cursor0 \
            libxcb-cursor-dev \
            zlib1g-dev \
            llvm

      - name: Configure CMake (ASan)
        run: cmake -B build-asan -S . -DACQ_SANITIZE=address -DCMAKE_BUILD_TYPE=RelWithDebInfo

      # Build ONLY the integration runner. acquisition_core + sentry/crashpad
      # compile under ASan (a heavy from-scratch build), but the `acquisition`
      # app target must never be sanitized. Allow generous build time.
      #
      # Cap at --parallel 2 (matching codeql.yml / build-linux.yml): ASan cc1plus
      # uses far more memory per translation unit than a plain build, so building
      # the heavy C++23/Qt TUs at full runner width (4 cores) exhausts RAM and
      # systemd-oomd kills the build cgroup with SIGTERM (exit 143). Two-wide
      # keeps peak memory well under the runner's limit.
      - name: Build integration runner
        run: cmake --build build-asan --target tst_workerintegration --parallel 2

      # detect_leaks=1 is the Linux default under ASan; set it explicitly.
      # abort_on_error=1 makes any ASan/LSan report fail the process (and the
      # test). print_suppressions=1 shows which suppressions matched, so Session
      # B can see whether the tight closure held. llvm-symbolizer (from the llvm
      # apt package) gives symbolized leak stacks that the leak: substrings match.
      - name: Run integration runner under ASan + LSan
        env:
          ASAN_OPTIONS: abort_on_error=1:detect_leaks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.supp:print_suppressions=1
        run: |
          ctest --test-dir build-asan -R tst_workerintegration --output-on-failure

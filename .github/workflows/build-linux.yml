name: Build & Package (Linux)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux-appimage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.11.1'
        modules: 'qtnetworkauth'
        cache: true
        cache-key-prefix: 'qt-6.11.1-linux'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          patchelf openssl libfuse2 \
          libcurl4-openssl-dev \
          libgl-dev \
          libssl-dev \
          libvulkan-dev \
          libxcb-cursor0 \
          libxcb-cursor-dev \
          zlib1g-dev

    - name: Download linuxdeploy
      run: |
        curl -Lo linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        curl -Lo linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy linuxdeploy-plugin-qt

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --parallel 2

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Get version
      id: version
      run: |
        version=$(grep APP_VERSION_STRING build/version_defines.h | cut -d'"' -f2)
        echo "version=$version"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Package AppImage
      env:
        QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
        LINUXDEPLOY_OUTPUT_VERSION: ${{ steps.version.outputs.version }}
        LINUXDEPLOY_EXCLUDED_LIBRARIES: "libqsqlmysql.so;libqsqlmimer.so;libqsqlodbc.so;libqsqlpsql.so;libqsqloci.so;libsqloci.so;libqsqlibase.so"
      run: |
        ./linuxdeploy \
          --appdir AppDir \
          --executable build/acquisition \
          --desktop-file acquisition.desktop \
          --icon-file assets/icons/icon.svg \
          --icon-filename default \
          --plugin qt \
          --output appimage

    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v7
      with:
        name: acquisition-${{ steps.version.outputs.version }}-x86_64.AppImage
        path: acquisition*.AppImage
        retention-days: 30

    - name: Upload debug symbols artifact
      uses: actions/upload-artifact@v7
      with:
        name: acquisition-${{ steps.version.outputs.version }}-x86_64.debug
        path: build/acquisition.debug
        retention-days: 30

    - name: Create draft release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: acquisition*.AppImage
        generate_release_notes: true
        draft: true
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

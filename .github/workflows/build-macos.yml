name: Build & Package (macOS)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos-dmg:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.11.1'
        modules: 'qtnetworkauth'
        cache: true
        cache-key-prefix: 'qt-6.11.1-macos'

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --parallel 3

    - name: Get version
      id: version
      run: |
        version=$(grep APP_VERSION_STRING build/version_defines.h | cut -d'"' -f2)
        echo "version=$version"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Package DMG
      run: |
        $QT_ROOT_DIR/bin/macdeployqt \
          build/acquisition.app \
          -verbose=2 \
          -always-overwrite \
          -appstore-compliant \
          -dmg

    - name: Rename DMG
      run: |
        mv build/acquisition.dmg \
          "build/Acquisition_${{ steps.version.outputs.version }}_arm64.dmg"

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v7
      with:
        name: Acquisition_${{ steps.version.outputs.version }}_arm64.dmg
        path: build/Acquisition_*.dmg
        retention-days: 30

    - name: Upload debug symbols artifact
      uses: actions/upload-artifact@v7
      with:
        name: Acquisition_${{ steps.version.outputs.version }}_arm64.dSYM
        path: build/acquisition*.dSYM
        retention-days: 30

    - name: Create draft release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: build/Acquisition_*.dmg
        generate_release_notes: true
        draft: true
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

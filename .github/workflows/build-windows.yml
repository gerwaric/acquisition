name: Build & Package (Windows)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtnetworkauth'
        cache: true
        cache-key-prefix: 'qt-6.10.3-win64'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --config Release --parallel 4

    - name: Prepare deployment
      run: |
        $deploy = "build\deploy"
        New-Item -ItemType Directory -Force -Path $deploy

        # Copy executables (crashpad_handler is copied next to acquisition by CMake post-build)
        Copy-Item "build\acquisition.exe" $deploy
        Copy-Item "build\crashpad_handler.exe" $deploy

        # Deploy Qt runtime dependencies
        & "$env:QT_ROOT_DIR\bin\windeployqt.exe" `
          --release `
          --compiler-runtime `
          --no-translations `
          --dir $deploy `
          "$deploy\acquisition.exe"

        # Ensure vc_redist is present (windeployqt --compiler-runtime should copy it,
        # but fall back to downloading if it doesn't)
        if (-not (Test-Path "$deploy\vc_redist.x64.exe")) {
          Write-Host "Downloading Visual C++ Redistributable..."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "$deploy\vc_redist.x64.exe"
        }

    - name: Install Inno Setup
      run: |
        $installer = "$env:TEMP\innosetup.exe"
        Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile $installer
        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/NORESTART" -Wait
        echo "${env:ProgramFiles(x86)}\Inno Setup 6" >> $env:GITHUB_PATH

    - name: Build installer
      run: |
        & ISCC.exe /DBUILD_DIR="build" /DDEPLOY_DIR="build\deploy" "installer.iss"

    - name: Get version
      id: version
      run: |
        if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
          $version = $matches[1]
        } else {
          $version = "dev-$(git rev-parse --short HEAD)"
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: acquisition-installer-${{ steps.version.outputs.version }}
        path: |
          Output/*.exe
          build/acquisition.pdb
        retention-days: 30

    - name: Create draft release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Output/Acquisition_setup_*.exe
          build/acquisition.pdb
        generate_release_notes: true
        draft: true
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
